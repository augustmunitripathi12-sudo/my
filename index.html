<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multiplayer Pixel RPG</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  touch-action: none;
}

body {
  overflow: hidden;
  background: #111;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  width: 100vw;
}

canvas {
  background: #1a1a1a;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  max-width: 100vw;
  max-height: 100vh;
}

#start-screen, #loading-screen {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #222;
  padding: 30px;
  border-radius: 12px;
  color: white;
  text-align: center;
  z-index: 100;
  min-width: 300px;
}

#loading-screen {
  z-index: 101;
}

.char-option {
  display: inline-block;
  margin: 10px;
  border: 3px solid transparent;
  border-radius: 10px;
  padding: 8px;
  cursor: pointer;
  transition: transform 0.1s;
}

.char-option:active {
  transform: scale(0.95);
}

.selected {
  border-color: #4ade80;
}

input {
  padding: 10px;
  width: 220px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  font-size: 16px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #4ade80;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  color: #111;
}

button:disabled {
  background: #555;
  cursor: not-allowed;
}

#chat {
  position: absolute;
  left: 10px;
  bottom: 10px;
  width: 300px;
  max-width: calc(100vw - 20px);
  background: rgba(0,0,0,0.85);
  padding: 10px;
  border-radius: 10px;
  display: none;
  z-index: 50;
}

#messages {
  height: 180px;
  overflow-y: auto;
  color: white;
  margin-bottom: 8px;
  font-size: 14px;
  word-break: break-word;
}

#chatInput {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #333;
  color: white;
}

#mobile-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 999;
  user-select: none;
}

.control-row {
  display: flex;
  justify-content: center;
}

.ctrl {
  width: 70px;
  height: 70px;
  margin: 5px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.25);
  color: white;
  font-size: 28px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}

.ctrl:active, .ctrl.pressed {
  background: #4ade80;
  color: #111;
}

#instructions {
  margin-top: 15px;
  font-size: 12px;
  color: #888;
}

@media (max-width: 900px) {
  #mobile-controls {
    display: block;
  }
  #chat {
    width: calc(100vw - 140px);
    left: 10px;
  }
}
</style>
</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="loading-screen">
  <h2>Loading Assets...</h2>
  <p id="load-status">0 / 24</p>
</div>

<div id="start-screen" style="display:none;">
  <h2>Choose Character</h2>

  <div class="char-option selected" data-char="original">
    <img src="frontwalk_1.png" width="64"><br>
    Black Suit
  </div>

  <div class="char-option" data-char="blue">
    <img src="bluefront1.png" width="64"><br>
    Blue Vest
  </div>

  <br>

  <input id="nameInput" maxlength="15" value="Player" autocomplete="off">

  <br>

  <button id="startBtn" onclick="startGame()">Start Game</button>

  <div id="instructions">
    Desktop: WASD or Arrow Keys to move<br>
    Mobile: Use on-screen D-Pad
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message... Press Enter" autocomplete="off">
</div>

<div id="mobile-controls">
  <div class="control-row">
    <button class="ctrl" id="up">&#9650;</button>
  </div>
  <div class="control-row">
    <button class="ctrl" id="left">&#9664;</button>
    <button class="ctrl" id="down">&#9660;</button>
    <button class="ctrl" id="right">&#9654;</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const socket = io();
const keys = {};

const SPRITE_WIDTH = 64;
const SPRITE_HEIGHT = 160;
const MOVE_SPEED = 2.4;
const FRAME_DELAY = 8;
const GROUND_OFFSET = 64;
const CANVAS_WIDTH = 800;
const CANVAS_HEIGHT = 600;

let animationTimer = 0;
let gameStarted = false;

// Pre-processed image cache
const processedImages = new Map();
const rawImages = new Map();
let totalImages = 0;
let loadedImages = 0;

function updateLoadStatus() {
  loadedImages++;
  document.getElementById("load-status").textContent = `${loadedImages} / ${totalImages}`;
  if (loadedImages >= totalImages) {
    document.getElementById("loading-screen").style.display = "none";
    document.getElementById("start-screen").style.display = "block";
  }
}

function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      rawImages.set(src, img);
      updateLoadStatus();
      resolve(img);
    };
    img.onerror = () => {
      updateLoadStatus();
      resolve(null);
    };
    img.src = src;
  });
}

function makeBlackTransparent(img) {
  if (!img) return null;
  if (processedImages.has(img.src)) {
    return processedImages.get(img.src);
  }

  const off = document.createElement("canvas");
  off.width = img.width || SPRITE_WIDTH;
  off.height = img.height || SPRITE_HEIGHT;
  const offCtx = off.getContext("2d");
  offCtx.drawImage(img, 0, 0);

  const imageData = offCtx.getImageData(0, 0, off.width, off.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    if (data[i] < 12 && data[i+1] < 12 && data[i+2] < 12) {
      data[i+3] = 0;
    }
  }

  offCtx.putImageData(imageData, 0, 0);
  processedImages.set(img.src, off);
  return off;
}

function loadSprites(prefix, underscore = true) {
  const frames = [];
  for (let i = 1; i <= 4; i++) {
    const src = underscore ? `${prefix}_${i}.png` : `${prefix}${i}.png`;
    totalImages++;
    frames.push(src);
  }
  return frames;
}

const characters = {
  original: {
    front: loadSprites("frontwalk", true),
    back: loadSprites("backwalk", true),
    side: loadSprites("rightwalk", true)
  },
  blue: {
    front: loadSprites("bluefront", false),
    back: loadSprites("blueback", false),
    side: loadSprites("blueright", false)
  }
};

// Preload all images
const allSrcs = [];
Object.values(characters).forEach(char => {
  allSrcs.push(...char.front, ...char.back, ...char.side);
});

Promise.all(allSrcs.map(loadImage)).then(() => {
  // Pre-process blue character images once
  Object.values(characters).forEach((char, idx) => {
    const charKey = Object.keys(characters)[idx];
    if (charKey === "blue") {
      ["front", "back", "side"].forEach(dir => {
        char[dir] = char[dir].map(src => {
          const img = rawImages.get(src);
          return makeBlackTransparent(img) || img;
        });
      });
    } else {
      ["front", "back", "side"].forEach(dir => {
        char[dir] = char[dir].map(src => rawImages.get(src)).filter(Boolean);
      });
    }
  });
});

let myPlayer = {
  x: 350,
  y: 250,
  frame: 0,
  facingLeft: false,
  currentDir: "front",
  name: "Player",
  character: "original"
};

const otherPlayers = {};

function startGame() {
  myPlayer.name = document.getElementById("nameInput").value.trim() || "Player";
  myPlayer.character = document.querySelector(".selected").dataset.char;

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("chat").style.display = "block";
  gameStarted = true;

  socket.emit("setPlayerData", {
    name: myPlayer.name,
    character: myPlayer.character
  });
}

document.querySelectorAll(".char-option").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".char-option").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
  });
});

// Also allow Enter key to start
document.getElementById("nameInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") startGame();
});

socket.on("currentPlayers", (players) => {
  Object.keys(players).forEach(id => {
    if (id !== socket.id) {
      otherPlayers[id] = players[id];
    }
  });
});

socket.on("playerJoined", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
  }
});

socket.on("playerMoved", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
  }
});

socket.on("playerUpdated", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
  }
});

socket.on("playerDisconnected", (id) => {
  delete otherPlayers[id];
});

socket.on("chatHistory", (history) => {
  history.forEach(addMessage);
});

socket.on("chatMessage", (msg) => {
  addMessage(msg);
});

function addMessage(msg) {
  const div = document.createElement("div");
  div.textContent = `${msg.name}: ${msg.text}`;
  div.style.marginBottom = "5px";
  if (msg.id === socket.id) div.style.color = "#4ade80";
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

document.getElementById("chatInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const text = e.target.value.trim();
    if (text) {
      socket.emit("chatMessage", text);
      e.target.value = "";
    }
  }
});

// MOBILE CONTROLS - improved with touch handlers
function bindMobile(btn, key) {
  const el = document.getElementById(btn);
  if (!el) return;

  const setKey = (val) => { keys[key] = val; };

  el.addEventListener("touchstart", (e) => {
    e.preventDefault();
    setKey(true);
    el.classList.add("pressed");
  }, { passive: false });

  el.addEventListener("touchend", (e) => {
    e.preventDefault();
    setKey(false);
    el.classList.remove("pressed");
  }, { passive: false });

  el.addEventListener("touchcancel", (e) => {
    e.preventDefault();
    setKey(false);
    el.classList.remove("pressed");
  }, { passive: false });

  // Mouse fallback for testing on desktop with clicks
  el.addEventListener("mousedown", (e) => {
    e.preventDefault();
    setKey(true);
    el.classList.add("pressed");
  });

  el.addEventListener("mouseup", (e) => {
    e.preventDefault();
    setKey(false);
    el.classList.remove("pressed");
  });

  el.addEventListener("mouseleave", (e) => {
    setKey(false);
    el.classList.remove("pressed");
  });
}

bindMobile("up", "w");
bindMobile("down", "s");
bindMobile("left", "a");
bindMobile("right", "d");

// Keyboard controls - WASD + Arrow keys
document.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) {
    if (k === "arrowup") keys["w"] = true;
    if (k === "arrowdown") keys["s"] = true;
    if (k === "arrowleft") keys["a"] = true;
    if (k === "arrowright") keys["d"] = true;
    keys[k] = true;
  }
});

document.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (["w","a","s","d","arrowup","arrowdown","arrowleft","arrowright"].includes(k)) {
    if (k === "arrowup") keys["w"] = false;
    if (k === "arrowdown") keys["s"] = false;
    if (k === "arrowleft") keys["a"] = false;
    if (k === "arrowright") keys["d"] = false;
    keys[k] = false;
  }
});

function update() {
  if (!gameStarted) return;

  let dx = 0;
  let dy = 0;

  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;

  const moving = dx !== 0 || dy !== 0;

  if (moving) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * MOVE_SPEED;
    dy = (dy / len) * MOVE_SPEED;

    myPlayer.x += dx;
    myPlayer.y += dy;

    // World boundaries
    myPlayer.x = Math.max(0, Math.min(CANVAS_WIDTH - SPRITE_WIDTH, myPlayer.x));
    myPlayer.y = Math.max(GROUND_OFFSET, Math.min(CANVAS_HEIGHT, myPlayer.y));

    if (dy < 0) myPlayer.currentDir = "back";
    else if (dy > 0) myPlayer.currentDir = "front";
    else myPlayer.currentDir = "side";

    myPlayer.facingLeft = dx < 0;

    animationTimer++;
    if (animationTimer >= FRAME_DELAY) {
      myPlayer.frame = (myPlayer.frame + 1) % 4;
      animationTimer = 0;
    }
  } else {
    myPlayer.frame = 0;
    animationTimer = 0;
  }

  // Send only necessary data, throttled by requestAnimationFrame naturally
  socket.volatile.emit("playerMovement", {
    x: myPlayer.x,
    y: myPlayer.y,
    frame: myPlayer.frame,
    facingLeft: myPlayer.facingLeft,
    currentDir: myPlayer.currentDir
  });
}

function getFrames(player) {
  const char = characters[player.character] || characters.original;
  if (player.currentDir === "back") return char.back;
  if (player.currentDir === "side") return char.side;
  return char.front;
}

function drawPlayer(player) {
  const frames = getFrames(player);
  const img = frames[player.frame];
  if (!img) return;

  const drawX = Math.round(player.x);
  const drawY = Math.round(player.y - GROUND_OFFSET);

  if (player.facingLeft) {
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(img, -drawX - SPRITE_WIDTH, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
    ctx.restore();
  } else {
    ctx.drawImage(img, drawX, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
  }

  // Name tag with shadow for readability
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  const nameWidth = ctx.measureText(player.name).width;
  ctx.fillRect(drawX + SPRITE_WIDTH/2 - nameWidth/2 - 4, drawY - 24, nameWidth + 8, 18);
  ctx.fillStyle = "white";
  ctx.fillText(player.name, drawX + SPRITE_WIDTH/2, drawY - 10);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

  // Draw floor grid for visual reference
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;
  for (let x = 0; x < CANVAS_WIDTH; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, CANVAS_HEIGHT);
    ctx.stroke();
  }
  for (let y = 0; y < CANVAS_HEIGHT; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(CANVAS_WIDTH, y);
    ctx.stroke();
  }

  // Sort all players by Y for depth (pseudo-3D)
  const allPlayers = [myPlayer, ...Object.values(otherPlayers)];
  allPlayers.sort((a, b) => a.y - b.y);
  allPlayers.forEach(drawPlayer);
}

let lastTime = 0;
function loop(timestamp) {
  const delta = timestamp - lastTime;
  if (delta >= 16) { // ~60fps cap
    update();
    draw();
    lastTime = timestamp;
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
